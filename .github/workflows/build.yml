name: Build Windows + macOS

# Builds J.A.R.V.I.S. installers in the cloud.
# - Push to main / manual run: produces downloadable build artifacts.
# - Push a tag like v0.1.8: also publishes a GitHub Release with the Windows
#   installer (.exe) and macOS .dmg/.zip (Intel + Apple Silicon) attached.
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-13   # Intel
            arch: x64
          - runner: macos-14   # Apple Silicon
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22   # match Electron 35's bundled Node version
      - run: npm install
      - name: Rebuild native modules for Electron (${{ matrix.arch }})
        run: npx @electron/rebuild -f
      - name: Download Vosk speech model
        run: npm run download-model
      - name: Build macOS app (${{ matrix.arch }})
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false   # no cert in CI; afterSign hook does ad-hoc codesign
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} # needed if --publish always is used on tags
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            # Tag push → build and publish directly to the GitHub Release
            npx electron-builder --mac --${{ matrix.arch }} --publish always
          else
            # Branch push → build only, upload as workflow artifact
            npx electron-builder --mac --${{ matrix.arch }} --publish never
          fi
      - name: Upload build artifacts (non-tag builds)
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-mac-${{ matrix.arch }}
          path: |
            dist/*.dmg
            dist/*.zip
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - name: Rebuild native modules for Electron
        run: npx @electron/rebuild -f
      - name: Download Vosk speech model
        run: npm run download-model
      - name: Build Windows installer
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false  # no signing certs in CI (unsigned build)
        run: npx electron-builder --win --publish never
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-windows
          path: dist/*.exe
          if-no-files-found: error
      - name: Publish to GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" \
            --notes "Automated build — Windows installer + macOS dmg." 2>/dev/null || true
          # Include latest.yml + .blockmap so electron-updater can detect updates.
          gh release upload "$GITHUB_REF_NAME" dist/*.exe dist/*.yml dist/*.blockmap --clobber
